services:
  macds_control_plane:
    build: .
    container_name: macds_control_plane
    ports:
      - "0.0.0.0:8000:8000"
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped
    volumes:
      - ./qtables:/app/qtables
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
